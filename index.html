<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Abhishek Dubey — Software Engineer. Portfolio, work experience, and projects."
    />
    <meta name="theme-color" content="#12100d" />
    <link rel="icon" type="image/png" href="/image.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter:wght@400;450;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <title>Abhishek Dubey — Software Engineer</title>
    <script>
      // Apply saved/system theme before first paint to avoid a flash.
      (function () {
        var theme = "dark";
        try {
          var stored = localStorage.getItem("theme");
          if (stored === "light" || stored === "dark") {
            theme = stored;
          } else if (
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: light)").matches
          ) {
            theme = "light";
          }
        } catch (e) {
          // Storage unavailable — keep dark default.
        }
        document.documentElement.dataset.theme = theme;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
